name: Build Skyview IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          xcodebuild -version
          sw_vers

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Build (unsigned — AltServer signs on install)
        run: |
          xcodebuild -project Skyview.xcodeproj -scheme Skyview \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/Skyview.app" Payload/
          zip -qry Skyview.ipa Payload
          ls -la Skyview.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skyview-ipa
          path: Skyview.ipa

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Skyview (latest)
          files: Skyview.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Skyview
options:
  bundleIdPrefix: com.suryayelagam
  deploymentTarget:
    iOS: "17.0"
targets:
  Skyview:
    type: application
    platform: iOS
    sources: [Sources, Assets.xcassets]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suryayelagam.skyview
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIViewControllerBasedStatusBarAppearance: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMotionUsageDescription: "Skyview uses the compass to point you at planes overhead."
        NSLocationWhenInUseUsageDescription: "Used by Home Assistant dashboards you open."

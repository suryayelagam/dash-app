name: Dash
options:
  bundleIdPrefix: com.suryayelagam
  deploymentTarget:
    iOS: "17.0"
targets:
  Dash:
    type: application
    platform: iOS
    sources: [Sources, Assets.xcassets]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suryayelagam.dash
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Dash
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMotionUsageDescription: "Dash points you at planes overhead using motion sensors."
        NSLocationWhenInUseUsageDescription: "Dash uses the compass heading to point you at planes."
        NSRemindersFullAccessUsageDescription: "Dash shows and manages your to-do list via Reminders."
